name: PersonalHealthTracker
options:
  bundleIdPrefix: com.example
targets:
  PersonalHealthTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/PersonalHealthTracker
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "This app needs to read health data to analyze your health risks."
        NSHealthUpdateUsageDescription: "This app needs access to update your health data."
        NSSpeechRecognitionUsageDescription: "S.M.A.I. requires speech recognition to understand your voice commands."
        NSMicrophoneUsageDescription: "S.M.A.I. needs microphone access to listen to you."
